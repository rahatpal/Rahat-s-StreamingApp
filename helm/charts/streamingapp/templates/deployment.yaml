apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamingapp-frontend
  namespace: streamingapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streamingapp-frontend
  template:
    metadata:
      labels:
        app: streamingapp-frontend
    spec:
      containers:
      - name: frontend
        image: {{ .Values.imageTag | default "latest" }}
        ports:
        - containerPort: {{ .Values.frontend.containerPort }}
---
